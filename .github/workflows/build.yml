name: Build Gateware

on:
  push:
    branches: [main]
    paths: ['gateware/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - hl2b2_main
          - hl2b3to4_main
          - hl2b3to4_cicrx
          - hl2b5up_main
          - hl2b5up_main_iambic
          - hl2b5up_6rx
          - hl2b5up_cicrx
          - hl2b5up_15ce
          - hl2b5up_ak4951v3
          - hl2b5up_ak4951v3_yaesu
          - hl2b5up_ak4951v4_yaesu
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.variant }}
        working-directory: gateware/variants/${{ matrix.variant }}
        run: |
          echo "::group::Build ${{ matrix.variant }}"
          docker run --rm -v "$GITHUB_WORKSPACE:/build" -w "/build/gateware/variants/${{ matrix.variant }}" \
            raetro/quartus:21.1.1 make all 2>&1 | tee build.log
          echo "::endgroup::"

      - name: Check build result
        working-directory: gateware/variants/${{ matrix.variant }}
        run: |
          if [ -f build/hermeslite.sof ]; then
            echo "Build successful: hermeslite.sof found"
          elif [ -f build/hermeslite.flow.rpt ]; then
            echo "Build failed - showing errors:"
            grep -i 'error' build/hermeslite.flow.rpt | grep -v 'Peak virtual\|Processing ended\|Elapsed time\|Total CPU' || true
            exit 1
          else
            echo "Build produced no output files"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}
          path: |
            gateware/variants/${{ matrix.variant }}/build/*.rbf
            gateware/variants/${{ matrix.variant }}/build/*.jic
            gateware/variants/${{ matrix.variant }}/build/*.jam
            gateware/variants/${{ matrix.variant }}/build/*.svf
          retention-days: 30

  release:
    needs: build
    runs-on: [self-hosted, Linux, X64]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          generate_release_notes: true
